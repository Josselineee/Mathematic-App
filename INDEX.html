<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Master - Aprende Jugando</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4834d4;
            --success: #0be881;
            --danger: #ff5e57;
            --warning: #ffdd59;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #2d3436;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            width: 380px;
            text-align: center;
            position: relative;
            min-height: 500px;
            display: flex;
            flex-direction: column;
        }

        h1 { font-weight: 900; margin-bottom: 20px; color: var(--primary); }

        /* Vistas */
        .view { display: none; flex-direction: column; height: 100%; }
        .view.active { display: flex; }

        /* Botones Generales */
        button {
            padding: 15px;
            border: none;
            border-radius: 15px;
            font-weight: 800;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 10px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }

        button:active { transform: translateY(3px); box-shadow: none; }

        /* Botones de Menú */
        .btn-mode { color: white; background: var(--primary); }
        .btn-mode.easy { background: #2ecc71; }
        .btn-mode.medium { background: #f1c40f; color: #856404; }
        .btn-mode.hard { background: #e74c3c; }

        /* Juego */
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-item { background: #f1f2f6; padding: 10px; border-radius: 12px; font-size: 14px; font-weight: bold; }
        
        .timer-box { width: 100%; height: 10px; background: #dfe6e9; border-radius: 5px; margin-bottom: 20px; overflow: hidden; }
        .timer-bar { height: 100%; width: 100%; background: var(--success); transition: width 1s linear; }

        .question-display {
            font-size: 42px;
            font-weight: 900;
            background: #fff9db;
            padding: 20px;
            border-radius: 18px;
            margin-bottom: 20px;
            border: 3px dashed #ffe066;
        }

        .answers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-ans { background: #fab1a0; color: #d63031; }
        .btn-ans:hover { background: #ff7675; color: white; }

        /* Overlay Pausa */
        #pause-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95);
            z-index: 100;
            border-radius: 24px;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .result-text { font-weight: bold; margin-top: 10px; height: 24px; }
    </style>
</head>
<body>

<div class="card">
    <div id="menu-view" class="view active">
        <h1>🧠 Math Master</h1>
        <p>Selecciona tu modo de juego:</p>
        <button class="btn-mode easy" onclick="initGame('easy')">🟢 Modo Básico</button>
        <button class="btn-mode medium" onclick="initGame('medium')">🟡 Modo Ninja (x)</button>
        <button class="btn-mode hard" onclick="initGame('hard')">🔴 Modo Genio (÷)</button>
        <div style="margin-top: auto; font-size: 14px; color: #636e72;">
            Récord Actual: <span id="global-highscore">0</span>
        </div>
    </div>

    <div id="game-view" class="view">
        <div id="pause-overlay">
            <h2>JUEGO EN PAUSA</h2>
            <button class="btn-mode" style="width: 200px;" onclick="togglePause()">▶ REANUDAR</button>
            <button class="btn-ans" style="width: 200px;" onclick="exitToMenu()">🏠 SALIR</button>
        </div>

        <div class="stats">
            <div class="stat-item" id="lvl-txt">Nivel: 1</div>
            <div class="stat-item" id="pts-txt">Puntos: 0</div>
        </div>

        <div class="timer-box">
            <div id="t-bar" class="timer-bar"></div>
        </div>

        <div class="question-display" id="q-text">0 + 0</div>

        <div class="answers-grid" id="ans-grid"></div>

        <div style="margin-top: 20px; display: flex; gap: 10px;">
            <button onclick="togglePause()" style="flex: 1; background: #9b59b6; color: white;">⏸ Pausa</button>
            <button onclick="exitToMenu()" style="flex: 1; background: #95a5a6; color: white;">🏠 Menú</button>
        </div>
        <div id="res-msg" class="result-text"></div>
    </div>
</div>

<script>
    let state = {
        score: 0,
        level: 1,
        mode: 'easy',
        currentAns: 0,
        timeLeft: 10,
        isPaused: false,
        timer: null
    };

    const config = {
        easy: { ops: ['+', '-'], range: 10 },
        medium: { ops: ['+', '-', '*'], range: 12 },
        hard: { ops: ['+', '-', '*', '/'], range: 20 }
    };

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function initGame(mode) {
        state.mode = mode;
        state.score = 0;
        state.level = 1;
        state.isPaused = false;
        showView('game-view');
        nextQuestion();
    }

    function togglePause() {
        state.isPaused = !state.isPaused;
        document.getElementById('pause-overlay').style.display = state.isPaused ? 'flex' : 'none';
        if (!state.isPaused) runTimer();
        else clearInterval(state.timer);
    }

    function exitToMenu() {
        clearInterval(state.timer);
        document.getElementById('global-highscore').textContent = localStorage.getItem('mathHigh') || 0;
        showView('menu-view');
    }

    function runTimer() {
        clearInterval(state.timer);
        state.timer = setInterval(() => {
            if (state.isPaused) return;
            state.timeLeft--;
            updateTimerUI();
            if (state.timeLeft <= 0) {
                clearInterval(state.timer);
                handleMistake("⏰ ¡Tiempo!");
            }
        }, 1000);
    }

    function updateTimerUI() {
        const bar = document.getElementById('t-bar');
        bar.style.width = (state.timeLeft / 10 * 100) + "%";
        bar.style.background = state.timeLeft < 4 ? "#ff5e57" : "#0be881";
    }

    function nextQuestion() {
        state.timeLeft = 10;
        state.level = Math.floor(state.score / 5) + 1;
        updateTimerUI();
        
        const conf = config[state.mode];
        const op = conf.ops[Math.floor(Math.random() * conf.ops.length)];
        let n1, n2;

        if (op === '/') {
            state.currentAns = Math.floor(Math.random() * 9) + 1;
            n2 = Math.floor(Math.random() * 9) + 1;
            n1 = state.currentAns * n2;
        } else if (op === '*') {
            n1 = Math.floor(Math.random() * (conf.range + state.level));
            n2 = Math.floor(Math.random() * 10);
            state.currentAns = n1 * n2;
        } else {
            n1 = Math.floor(Math.random() * (conf.range * state.level));
            n2 = Math.floor(Math.random() * (conf.range * state.level));
            if (op === '-' && n1 < n2) [n1, n2] = [n2, n1];
            state.currentAns = (op === '+') ? n1 + n2 : n1 - n2;
        }

        document.getElementById('q-text').textContent = `${n1} ${op} ${n2}`;
        document.getElementById('lvl-txt').textContent = `Nivel: ${state.level}`;
        document.getElementById('pts-txt').textContent = `Puntos: ${state.score}`;

        // Generar 6 opciones
        let choices = [state.currentAns];
        while(choices.length < 6) {
            let offset = Math.floor(Math.random() * 10) + 1;
            let wrong = Math.random() > 0.5 ? state.currentAns + offset : state.currentAns - offset;
            if(wrong >= 0 && !choices.includes(wrong)) choices.push(wrong);
        }
        choices.sort(() => Math.random() - 0.5);

        const grid = document.getElementById('ans-grid');
        grid.innerHTML = '';
        choices.forEach(c => {
            const btn = document.createElement('button');
            btn.className = 'btn-ans';
            btn.textContent = c;
            btn.onclick = () => check(c);
            grid.appendChild(btn);
        });
        
        runTimer();
    }

    function check(val) {
        if (state.isPaused) return;
        clearInterval(state.timer);
        if (val === state.currentAns) {
            state.score++;
            document.getElementById('res-msg').textContent = "✅ ¡Correcto!";
            document.getElementById('res-msg').style.color = "#27ae60";
            saveHigh();
            setTimeout(() => {
                document.getElementById('res-msg').textContent = "";
                nextQuestion();
            }, 600);
        } else {
            handleMistake("❌ ¡Incorrecto!");
        }
    }

    function handleMistake(msg) {
        state.score = Math.max(0, state.score - 1);
        document.getElementById('res-msg').textContent = msg;
        document.getElementById('res-msg').style.color = "#e74c3c";
        setTimeout(() => {
            document.getElementById('res-msg').textContent = "";
            nextQuestion();
        }, 1000);
    }

    function saveHigh() {
        let cur = localStorage.getItem('mathHigh') || 0;
        if (state.score > cur) localStorage.setItem('mathHigh', state.score);
    }

    // Cargar récord inicial
    document.getElementById('global-highscore').textContent = localStorage.getItem('mathHigh') || 0;
</script>

</body>
</html>
